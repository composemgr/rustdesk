# nginx proxy address - http://172.17.0.1:21114
name: rustdesk

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

x-shared:
  rustdesk-image: &rustdesk-image
    image: docker.io/rustdesk/rustdesk-server-pro:latest

services:
  server:
    <<: *rustdesk-image
    container_name: rustdesk-server
    hostname: hbbs
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: rustdesk-server
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
    command: hbbs -r ${RUSTDESK_RELAY_HOST:-127.0.0.1}:21117 -k ""
    ports:
      - 21115:21115/tcp
      - 21116:21116/tcp
      - 21116:21116/udp
      - 21118:21118/tcp
      - 172.17.0.1:21114:21114/tcp
    volumes:
      - './volumes/data/server:/root'
    depends_on:
      - relay
    networks:
      - rustdesk
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://rustdesk-server:21114'
      - 'cloudflare.hostname=rustdesk.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.rustdesk-server.entrypoints=http'
      - 'traefik.http.routers.rustdesk-server-secure.tls=true'
      - 'traefik.http.routers.rustdesk-server.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.rustdesk-server-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.rustdesk-server.middlewares=rustdesk-server-https-redirect'
      - 'traefik.http.routers.rustdesk-server-secure.entrypoints=https'
      - 'traefik.http.routers.rustdesk-server-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.rustdesk-server-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.rustdesk-server-secure.service=rustdesk-server'
      - 'traefik.http.services.rustdesk-server.loadbalancer.server.port=21114'

  relay:
    <<: *rustdesk-image
    container_name: rustdesk-relay
    hostname: hbbr
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: rustdesk-relay
    command: hbbr -k ""
    ports:
      - 21117/tcp
      - 21119/tcp
    volumes:
      - './volumes/data/relay:/root'
    networks:
      - rustdesk

networks:
  rustdesk:
    name: rustdesk
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
