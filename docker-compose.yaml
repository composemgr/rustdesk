# nginx proxy address - http://172.17.0.1:21114
name: rustdesk

x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

x-shared:
  rustdesk-image: &rustdesk-image
    image: docker.io/rustdesk/rustdesk-server-pro:latest

services:
  server:
    <<: *rustdesk-image
    container_name: rustdesk-server
    hostname: hbbs
    restart: always
    pull_policy: always
    logging: *default-logging
    command: hbbs -r 142.171.254.123:21117 -k ""
    ports:
      - 21115:21115/tcp
      - 21116:21116/tcp
      - 21116:21116/udp
      - 21118:21118/tcp
      - 172.17.0.1:21114:21114/tcp
    volumes:
      - './rootfs/data/server:/root'
    depends_on:
      - relay
    networks:
      - rustdesk

  relay:
    <<: *rustdesk-image
    container_name: rustdesk-relay
    hostname: hbbr
    restart: always
    pull_policy: always
    logging: *default-logging
    command: hbbr -k ""
    ports:
      - 21117/tcp
      - 21119/tcp
    volumes:
      - './rootfs/data/relay:/root'
    networks:
      - rustdesk

networks:
  rustdesk:
    name: rustdesk
    external: false
